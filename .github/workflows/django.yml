name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: unione_db
          POSTGRES_USER: unione
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: unione_db
      DB_USER: unione
      DB_PASSWORD: password
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/1
      COVERAGE_FAIL_UNDER: "70"

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    - name: Run Ruff Linting
      run: |
        ruff check .
    - name: Security Audit (Bandit)
      run: |
        bandit -r . -x ./tests
    - name: Type Check (Mypy)
      continue-on-error: true
      run: |
        mypy .
    - name: Django System Check
      run: |
        python manage.py check
    - name: Run Django Tests with Coverage
      run: |
        coverage run manage.py test accounts organization enrollment academics -v 2
        coverage report --omit="*/migrations/*,*/tests*.py,manage.py" --fail-under=${{ env.COVERAGE_FAIL_UNDER }}
        coverage xml --omit="*/migrations/*,*/tests*.py,manage.py" -o coverage.xml
    - name: Upload Coverage Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: django-coverage-py${{ matrix.python-version }}
        path: |
          coverage.xml
          .coverage
