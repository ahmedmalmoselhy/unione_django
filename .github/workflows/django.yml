name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    env:
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: db.sqlite3
      COVERAGE_FAIL_UNDER: "60"

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    - name: Django System Check
      run: |
        python manage.py check
    - name: Run Django Tests with Coverage
      run: |
        coverage run manage.py test accounts organization enrollment academics -v 2
        coverage report --omit="*/migrations/*,*/tests.py,manage.py" --fail-under=${{ env.COVERAGE_FAIL_UNDER }}
        coverage xml --omit="*/migrations/*,*/tests.py,manage.py" -o coverage.xml
    - name: Upload Coverage Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: django-coverage-py${{ matrix.python-version }}
        path: |
          coverage.xml
          .coverage
